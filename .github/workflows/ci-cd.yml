name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify backend syntax
        run: python -m compileall backend

  deploy:
    name: Deploy to Firebase Hosting
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT secret is empty"
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/firebase-service-account.json"
          if ! python - <<'PY'
          import json, os
          path = os.path.expanduser('~/.config/firebase/ci-token')
          print(path)
  with open(os.environ['HOME'] + '/firebase-service-account.json', 'r', encoding='utf-8') as f:
    data = json.load(f)
    assert data.get('type') == 'service_account'
    assert data.get('project_id')
    assert data.get('private_key')
    assert data.get('client_email')
    print('Service account JSON looks valid')
           PY
          then
            echo "FIREBASE_SERVICE_ACCOUNT is not a valid service account JSON"
            exit 1
          fi
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-service-account.json"
          npm install -g firebase-tools@latest
          firebase projects:list
          firebase deploy --only hosting --project ragwebsummarizer --non-interactive
