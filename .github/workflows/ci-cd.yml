name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Verify backend syntax
        run: python -m compileall backend

  deploy:
    name: Deploy to Firebase Hosting
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Resolve Firebase service account
        id: firebase_secret
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            secret="$FIREBASE_SERVICE_ACCOUNT_JSON"
          elif [ -n "$FIREBASE_SERVICE_ACCOUNT" ]; then
            secret="$FIREBASE_SERVICE_ACCOUNT"
          else
            echo "deploy_enabled=false" >> "$GITHUB_OUTPUT"
            echo "Firebase deployment skipped because no service account secret is configured."
            exit 0
          fi

          echo "deploy_enabled=true" >> "$GITHUB_OUTPUT"
          echo "firebaseServiceAccount<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$secret" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate Firebase service account
        if: steps.firebase_secret.outputs.deploy_enabled == 'true'
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ steps.firebase_secret.outputs.firebaseServiceAccount }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          payload = os.environ['FIREBASE_SERVICE_ACCOUNT']
          data = json.loads(payload)
          required = ['type', 'project_id', 'private_key', 'client_email']
          missing = [field for field in required if not data.get(field)]
          if missing:
              print(f"::error::Firebase service account is missing required fields: {', '.join(missing)}")
              sys.exit(1)
          print('Firebase service account format looks valid.')
          PY

      - name: Skip deployment when Firebase secret is missing
        if: steps.firebase_secret.outputs.deploy_enabled != 'true'
        run: echo "Deployment was skipped. Add FIREBASE_SERVICE_ACCOUNT or FIREBASE_SERVICE_ACCOUNT_JSON in GitHub repository secrets to enable it."

      - name: Deploy to Firebase Hosting
        if: steps.firebase_secret.outputs.deploy_enabled == 'true'
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ steps.firebase_secret.outputs.firebaseServiceAccount }}
          projectId: ragwebsummarizer
          entryPoint: .
          channelId: live
